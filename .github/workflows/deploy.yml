name: Deploy to VPS

# Se dispara automáticamente cuando "Build & Push Docker Images" termina con éxito
# en la rama main. Puede ejecutarse también manualmente desde la pestaña Actions.
on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Solo despliega si el build previo fue exitoso (o si es disparo manual)
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            echo "── 1. Actualizando código fuente ──────────────────────────"
            git pull origin main

            echo "── 2. Reconstruyendo y reiniciando contenedores ───────────"
            cd infrastructure
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env \
              up -d --build

            echo "── 3. Limpiando imágenes antiguas ─────────────────────────"
            docker image prune -f

            echo "✅ Deploy completado: $(date)"
            # Las migraciones de Prisma corren automáticamente al iniciar el
            # contenedor backend (CMD ejecuta 'prisma migrate deploy').
