apiVersion: apps/v1
kind: Deployment
metadata:
  name: pensum-frontend
  namespace: pensum-cloud
  labels:
    app: pensum-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pensum-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pensum-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/pensum-cloud-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
