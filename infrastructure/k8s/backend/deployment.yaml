apiVersion: apps/v1
kind: Deployment
metadata:
  name: pensum-backend
  namespace: pensum-cloud
  labels:
    app: pensum-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pensum-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pensum-backend
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/YOUR_ORG/pensum-cloud-backend:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pensum-backend-secrets
                  key: DATABASE_URL
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/pensum-cloud-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: pensum-backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pensum-backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pensum-backend-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: pensum-backend-secrets
                  key: JWT_REFRESH_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
