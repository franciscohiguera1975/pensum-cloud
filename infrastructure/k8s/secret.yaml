# IMPORTANT: Replace ALL base64 values before deploying to production.
# Generate secrets with: echo -n 'your-value' | base64
#
# Required values:
#   DATABASE_URL      → postgresql://pensum:PASSWORD@postgres:5432/pensum_db
#   JWT_SECRET        → random 64-char string
#   JWT_REFRESH_SECRET → random 64-char string
#   POSTGRES_PASSWORD → database password
apiVersion: v1
kind: Secret
metadata:
  name: pensum-backend-secrets
  namespace: pensum-cloud
type: Opaque
data:
  # echo -n 'postgresql://pensum:changeme@postgres:5432/pensum_db' | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL3BlbnN1bTpjaGFuZ2VtZUBwb3N0Z3Jlczo1NDMyL3BlbnN1bV9kYg==
  # echo -n 'change-me-jwt-secret-min-32-chars-long' | base64
  JWT_SECRET: Y2hhbmdlLW1lLWp3dC1zZWNyZXQtbWluLTMyLWNoYXJzLWxvbmc=
  # echo -n 'change-me-jwt-refresh-secret-min-32-chars' | base64
  JWT_REFRESH_SECRET: Y2hhbmdlLW1lLWp3dC1yZWZyZXNoLXNlY3JldC1taW4tMzItY2hhcnM=
---
apiVersion: v1
kind: Secret
metadata:
  name: pensum-postgres-secrets
  namespace: pensum-cloud
type: Opaque
data:
  # echo -n 'changeme' | base64
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'pensum' | base64
  POSTGRES_USER: cGVuc3Vt
  # echo -n 'pensum_db' | base64
  POSTGRES_DB: cGVuc3VtX2Ri
