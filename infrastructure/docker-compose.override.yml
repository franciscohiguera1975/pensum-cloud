# =============================================================================
# Pensum Cloud — Dev override (auto-merged por Docker Compose)
#
# Se activa automáticamente con: docker compose up
# Hot-reload activado via volume mounts.
# Debugger Node.js en puerto 9229 (attach desde VSCode).
# =============================================================================

services:

  # ── Backend (NestJS dev con debug) ─────────────────────────────────────────
  backend:
    build:
      context: ..                          # raíz del monorepo
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: pensum_backend_dev
    restart: unless-stopped
    env_file:
      - ../apps/backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pensum_cloud}?schema=public
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - '${BACKEND_PORT:-3000}:3000'
      - '${DEBUG_PORT:-9229}:9229'        # Node.js inspector (VSCode attach)
    volumes:
      # Hot-reload: montar solo src/ y prisma/ para no romper node_modules del container
      - ../apps/backend/src:/app/apps/backend/src
      - ../apps/backend/prisma:/app/apps/backend/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pensum_network

  # ── Frontend (Vite dev server con HMR) ─────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      target: development
    container_name: pensum_frontend_dev
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # La URL del backend la resuelve el NAVEGADOR (no el container), por eso es localhost
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      # Hot-reload: montar src/ del frontend
      - ../apps/frontend/src:/app/apps/frontend/src
    depends_on:
      - backend
    networks:
      - pensum_network
